bundle:
  name: corporate-finance-actuarial

resources:
  jobs:
    corporate_finance_daily:
      name: corporate_finance_daily
      environments:
        - environment_key: serverless_default
          spec:
            client: "1"
      tasks:
        - task_key: run_finance_actuarial_pipeline
          environment_key: serverless_default
          spark_python_task:
            python_file: scripts/run_pipeline.py
      max_concurrent_runs: 1
    corporate_finance_sql_setup:
      name: corporate_finance_sql_setup
      environments:
        - environment_key: serverless_default
          spec:
            client: "1"
      tasks:
        - task_key: apply_sql_setup
          environment_key: serverless_default
          spark_python_task:
            python_file: scripts/apply_sql_setup.py
      max_concurrent_runs: 1
    corporate_finance_demo_bootstrap:
      name: corporate_finance_demo_bootstrap
      environments:
        - environment_key: serverless_default
          spec:
            client: "1"
      tasks:
        - task_key: build_demo_state
          environment_key: serverless_default
          spark_python_task:
            python_file: scripts/build_demo_state.py
      max_concurrent_runs: 1
    corporate_finance_genie_benchmark:
      name: corporate_finance_genie_benchmark
      environments:
        - environment_key: serverless_default
          spec:
            client: "1"
      tasks:
        - task_key: run_genie_benchmarks
          environment_key: serverless_default
          spark_python_task:
            python_file: scripts/genie_benchmark_runner.py
      max_concurrent_runs: 1

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
  prod:
    mode: production
    workspace:
      host: https://e2-demo-field-eng.cloud.databricks.com
