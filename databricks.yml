bundle:
  name: corp-fin-actuarial

resources:
  jobs:
    corp_fin_actuarial_daily:
      name: corp_fin_actuarial_daily
      tasks:
        - task_key: run_finance_actuarial_pipeline
          spark_python_task:
            python_file: scripts/run_pipeline.py
      max_concurrent_runs: 1
    corp_fin_actuarial_demo_bootstrap:
      name: corp_fin_actuarial_demo_bootstrap
      tasks:
        - task_key: build_demo_state
          spark_python_task:
            python_file: scripts/build_demo_state.py
      max_concurrent_runs: 1
    corp_fin_actuarial_genie_benchmark:
      name: corp_fin_actuarial_genie_benchmark
      tasks:
        - task_key: run_genie_benchmarks
          spark_python_task:
            python_file: scripts/genie_benchmark_runner.py
      max_concurrent_runs: 1

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://<databricks-workspace-url>
  prod:
    mode: production
    workspace:
      host: https://<databricks-workspace-url>
